name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 31.0.3 for beta, 32.0.0 for stable)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - beta
          - stable
        default: beta

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            CHANNEL="${{ inputs.channel }}"
          else
            # Tag-triggered: extract version from tag, default to stable
            VERSION="${GITHUB_REF#refs/tags/v}"
            CHANNEL="stable"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CHANNEL=$CHANNEL" >> $GITHUB_OUTPUT
          echo "IS_BETA=$([[ $CHANNEL == 'beta' ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Generate ModkitVersion.cs
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_NUMBER=$(echo "$VERSION" | cut -d. -f1)

          cat > src/Shared/ModkitVersion.cs << EOF
          namespace Menace;
          public static class ModkitVersion
          {
              public const int BuildNumber = $BUILD_NUMBER;
              public const string MelonVersion = "$VERSION";
              public const string Short = "v$BUILD_NUMBER";
              public const string AppFull = "Menace Modkit v$BUILD_NUMBER";
              public const string LoaderFull = "Menace Modpack Loader v$BUILD_NUMBER";
          }
          EOF

      - name: Build GUI (Linux)
        run: |
          dotnet publish src/Menace.Modkit.App -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false \
            -o dist/gui-linux-x64

      - name: Build GUI (Windows)
        run: |
          dotnet publish src/Menace.Modkit.App -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false \
            -o dist/gui-win-x64

      - name: Build Mod Manager (Linux)
        run: |
          dotnet publish src/Menace.ModManager.App -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false \
            -o dist/manager-linux-x64

      - name: Build Mod Manager (Windows)
        run: |
          dotnet publish src/Menace.ModManager.App -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false \
            -o dist/manager-win-x64

      - name: Build MCP Server (Linux)
        run: |
          dotnet publish src/Menace.Modkit.Mcp -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false \
            -o dist/mcp-linux-x64

      - name: Build MCP Server (Windows)
        run: |
          dotnet publish src/Menace.Modkit.Mcp -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false \
            -o dist/mcp-win-x64

      - name: Update version manifests
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANNEL="${{ steps.version.outputs.CHANNEL }}"

          if [ "$CHANNEL" == "beta" ]; then
            # Beta: update versions-beta.json only
            jq --arg version "$VERSION" '.components.Modkit.version = $version' \
              third_party/versions-beta.json > tmp.json && mv tmp.json third_party/versions-beta.json
            echo "Updated versions-beta.json with Modkit version $VERSION"
          else
            # Stable: update both manifests
            jq --arg version "$VERSION" '.components.Modkit.version = $version' \
              third_party/versions.json > tmp.json && mv tmp.json third_party/versions.json
            jq --arg version "$VERSION" '.components.Modkit.version = $version' \
              third_party/versions-beta.json > tmp.json && mv tmp.json third_party/versions-beta.json
            echo "Updated versions.json and versions-beta.json with Modkit version $VERSION"
          fi

      - name: Bundle files
        run: |
          # Modkit GUI: full authoring payload (DataExtractor + ModpackLoader + refs + MCP).
          for platform in linux-x64 win-x64; do
            mkdir -p dist/gui-$platform/third_party/bundled
            mkdir -p dist/gui-$platform/mcp
            cp third_party/versions.json dist/gui-$platform/third_party/
            cp third_party/versions-beta.json dist/gui-$platform/third_party/
            cp -r third_party/bundled/DataExtractor dist/gui-$platform/third_party/bundled/
            cp -r third_party/bundled/ModpackLoader dist/gui-$platform/third_party/bundled/
            [ -d "third_party/bundled/dotnet-refs" ] && cp -r third_party/bundled/dotnet-refs dist/gui-$platform/third_party/bundled/
          done
          # Bundle MCP server executables (optional component for AI assistant integration)
          cp dist/mcp-linux-x64/Menace.Modkit.Mcp dist/gui-linux-x64/mcp/
          cp dist/mcp-win-x64/Menace.Modkit.Mcp.exe dist/gui-win-x64/mcp/
          cp mcp/claude_config_example.json dist/gui-linux-x64/mcp/
          cp mcp/claude_config_example.json dist/gui-win-x64/mcp/
          cp mcp/README.md dist/gui-linux-x64/mcp/
          cp mcp/README.md dist/gui-win-x64/mcp/

          # Mod Manager: lean — only the version-paired ModpackLoader + manifest
          # (it downloads MelonLoader / Jiangyu itself on demand; no editors, no MCP).
          for platform in linux-x64 win-x64; do
            mkdir -p dist/manager-$platform/third_party/bundled
            cp third_party/versions.json dist/manager-$platform/third_party/
            cp -r third_party/bundled/ModpackLoader dist/manager-$platform/third_party/bundled/
          done

      - name: Create archives
        run: |
          cd dist
          tar -czf menace-modkit-linux-x64.tar.gz -C gui-linux-x64 .
          zip -q -r menace-modkit-win-x64.zip gui-win-x64/
          tar -czf menace-mod-manager-linux-x64.tar.gz -C manager-linux-x64 .
          zip -q -r menace-mod-manager-win-x64.zip manager-win-x64/

      - name: Commit manifest updates
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add third_party/versions.json third_party/versions-beta.json
          git diff --staged --quiet || git commit -m "Release v${{ steps.version.outputs.VERSION }} (${{ steps.version.outputs.CHANNEL }})"
          git push

      - name: Create App Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Menace Modkit & Mod Manager v${{ steps.version.outputs.VERSION }}${{ steps.version.outputs.IS_BETA == 'true' && ' (Beta)' || '' }}
          prerelease: ${{ steps.version.outputs.IS_BETA == 'true' }}
          generate_release_notes: true
          body: |
            Two apps ship in this release. Most people want the **Mod Manager**; get the **Modkit** only if you're making mods.

            ### 📦 Menace Mod Manager — install & play with mods
            A lean, standalone manager (r2modman / Vortex style) for mods you've downloaded. It installs, enables/disables and uninstalls every kind of MENACE mod — modpacks, raw MelonLoader mods, Jiangyu mods and custom-leader packs — from a single drag-and-drop window, and sets up the loaders they need (MelonLoader, Modpack Loader, Jiangyu). No editors, nothing to configure. **If you just want to play with mods, this is the one.**

            ### 🛠 Menace Modkit — make mods
            The full authoring toolkit for *building* MENACE mods: visual editors for templates, stats, assets, clones and custom leaders; a C# editor with live compilation; asset extraction/import; load-order and conflict tools; and one-click deploy to test in-game. Bundles the runtime loaders and an optional MCP server for AI-assisted authoring. **Get this only if you want to create mods.**

            Both are self-contained — no .NET install needed. Mods are loaded at runtime from the game's `Mods/` folder; neither app patches the game's own files.

            ## Download

            | App | Windows | Linux |
            |-----|---------|-------|
            | **Mod Manager** — play with mods | `menace-mod-manager-win-x64.zip` | `menace-mod-manager-linux-x64.tar.gz` |
            | **Modkit** — make mods | `menace-modkit-win-x64.zip` | `menace-modkit-linux-x64.tar.gz` |

            Extract and run. Each app downloads any extra components it needs on first launch.

            ${{ steps.version.outputs.IS_BETA == 'true' && '> **Note:** This is a beta release. It may contain bugs or incomplete features. Use with caution.' || '' }}
          files: |
            dist/menace-modkit-linux-x64.tar.gz
            dist/menace-modkit-win-x64.zip
            dist/menace-mod-manager-linux-x64.tar.gz
            dist/menace-mod-manager-win-x64.zip
